---
# Plex Preroll Manager - Gestion des pre-roll vidéos Plex
# Services : API FastAPI + Frontend Nginx
services:
  plex-preroll-api:
    build:
      context: ./source/backend
      dockerfile: Dockerfile
    container_name: plex-preroll-api
    env_file:
      - ../secrets/global.env
    environment:
      - PLEX_URL=http://172.25.0.1:32400
      - PLEX_PREROLL_PATH=/home/monsieurz/library/intro
    volumes:
      - ./data/api:/data
      - /home/monsieurz/library/intro:/data/prerolls:ro
    restart: unless-stopped
    networks:
      - proxy
      - internal
    labels:
      - com.centurylinklabs.watchtower.enable=true

  plex-preroll:
    image: nginx:alpine
    container_name: plex-preroll
    volumes:
      - ./source/frontend:/usr/share/nginx/html:ro
      - ./source/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - proxy
      - internal
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - plex-preroll-api

networks:
  proxy:
    external: true
  internal:
    driver: bridge
