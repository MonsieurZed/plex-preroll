---
# Plex Preroll Manager - Dev (source montée, hot-reload frontend)
# Accessible via preroll.dev.zed.cx → container plex-preroll-dev:3000
services:
  plex-preroll-dev-api:
    build:
      context: ./source/backend
      dockerfile: Dockerfile
    container_name: plex-preroll-dev-api
    env_file:
      - ../secrets/global.env
    environment:
      - PLEX_URL=http://172.25.0.1:32400
      - PLEX_PREROLL_PATH=/home/monsieurz/library/intro
    volumes:
      - ./data/api:/data
      - /home/monsieurz/library/intro:/data/prerolls:ro
    restart: unless-stopped
    networks:
      - proxy
      - internal
    labels:
      - com.centurylinklabs.watchtower.enable=false

  plex-preroll-dev:
    image: nginx:alpine
    container_name: plex-preroll-dev
    volumes:
      - ./source/frontend:/usr/share/nginx/html:ro
      - ./source/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - proxy
      - internal
    labels:
      - com.centurylinklabs.watchtower.enable=false
    depends_on:
      - plex-preroll-dev-api

networks:
  proxy:
    external: true
  internal:
    driver: bridge
