---
# Plex Preroll Manager - Production (image Docker Hub)
# Accessible via preroll.zed.cx → container plex-preroll:3000
services:
  plex-preroll:
    image: monsieurzed/plex-preroll:latest
    container_name: plex-preroll
    env_file:
      - ../secrets/global.env
    environment:
      - PLEX_URL=http://172.25.0.1:32400
      - PLEX_PREROLL_PATH=/home/monsieurz/library/intro
      - PREROLL_DIR=/prerolls
    volumes:
      - ./data/prod:/data
      - /home/monsieurz/library/intro:/prerolls:ro
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true

networks:
  proxy:
    external: true
